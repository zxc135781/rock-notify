name: Keep Alive

on:
  schedule:
    # 每月1号运行，防止60天不活跃导致定时工作流被暂停
    - cron: '0 2 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Keep alive
        run: |
          git tag -f keep-alive HEAD
          git push -f origin keep-alive
